<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Safety RAG | AI Knowledge Base</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --primary: #6366f1;
            --primary-glow: rgba(99, 102, 241, 0.5);
            --bg: #0f172a;
            --glass: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            color: #f8fafc;
            overflow-x: hidden;
        }

        .glass {
            background: var(--glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
        }

        .glow-shadow {
            box-shadow: 0 0 20px var(--primary-glow);
        }

        .chat-container {
            height: calc(100vh - 180px);
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }

        .typing::after {
            content: '|';
            animation: blink 1s infinite;
        }

        @keyframes blink {
            50% { opacity: 0; }
        }
    </style>
</head>
<body class="min-h-screen">
    <!-- Background Accents -->
    <div class="fixed -top-24 -left-24 w-96 h-96 bg-indigo-600 rounded-full blur-[120px] opacity-20 pointer-events-none"></div>
    <div class="fixed top-1/2 -right-24 w-80 h-80 bg-purple-600 rounded-full blur-[120px] opacity-10 pointer-events-none"></div>

    <div class="container mx-auto px-4 py-6 flex flex-col h-screen">
        <!-- Header -->
        <header class="flex items-center justify-between mb-8">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-indigo-600 rounded-lg flex items-center justify-center glow-shadow">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />
                    </svg>
                </div>
                <h1 class="text-2xl font-bold tracking-tight">Food Safety <span class="text-indigo-400">RAG</span></h1>
            </div>
            <div class="flex gap-4">
                <span class="px-3 py-1 bg-green-500/10 text-green-400 text-xs font-medium rounded-full border border-green-500/20 flex items-center gap-2">
                    <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                    System Online
                </span>
            </div>
        </header>

        <main class="flex flex-col lg:flex-row gap-6 flex-grow overflow-hidden">
            <!-- Chat Side -->
            <div class="flex-grow flex flex-col glass rounded-2xl p-4 md:p-6 overflow-hidden">
                <div id="chat-box" class="chat-container overflow-y-auto custom-scrollbar space-y-6 pr-2">
                    <!-- Welcome Message -->
                    <div class="flex gap-4 fade-in">
                        <div class="w-8 h-8 rounded-full bg-indigo-600 flex-shrink-0 flex items-center justify-center text-xs font-bold">AI</div>
                        <div class="bg-slate-800/50 rounded-2xl rounded-tl-none p-4 max-w-[85%] border border-white/5">
                            <p class="text-sm leading-relaxed">
                                Welcome to the Food Safety Intelligence Portal. I can help you with regulations, storage conditions, and compliance requirements. 
                                <br><br>
                                <span class="text-indigo-400 font-semibold italic">What would you like to know today?</span>
                            </p>
                        </div>
                    </div>
                </div>

                <!-- Input Area -->
                <div class="mt-4 pt-4 border-t border-white/5">
                    <div class="relative">
                        <input id="user-input" type="text" placeholder="Ask about food safety compliance..." 
                            class="w-full bg-slate-900/50 border border-white/10 rounded-xl py-4 pl-6 pr-24 focus:outline-none focus:border-indigo-500/50 transition-all text-sm">
                        <button id="send-btn" class="absolute right-2 top-2 bottom-2 px-6 bg-indigo-600 hover:bg-indigo-500 rounded-lg text-sm font-semibold transition-colors flex items-center gap-2">
                            <span>Ask</span>
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor">
                                <path d="M10.894 2.553a1 1 0 00-1.788 0l-7 14a1 1 0 001.169 1.409l5-1.429A1 1 0 009 15.571V11a1 1 0 112 0v4.571a1 1 0 00.725.962l5 1.428a1 1 0 001.17-1.408l-7-14z" />
                            </svg>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Context Side -->
            <div id="context-panel" class="w-full lg:w-96 flex flex-col glass rounded-2xl p-6 hidden lg:flex">
                <h2 class="text-lg font-semibold mb-4 flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-indigo-400" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M4 4a2 2 0 012-2h4.586A2 2 0 0112 2.586L15.414 6A2 2 0 0116 7.414V16a2 2 0 01-2 2H6a2 2 0 01-2-2V4zm2 6a1 1 0 011-1h6a1 1 0 110 2H7a1 1 0 01-1-1zm1 3a1 1 0 100 2h6a1 1 0 100-2H7z" clip-rule="evenodd" />
                    </svg>
                    Context Sources
                </h2>
                <div id="sources-list" class="space-y-4 overflow-y-auto custom-scrollbar flex-grow">
                    <p class="text-xs text-slate-400 italic">No sources currently loaded.</p>
                </div>
                
                <div class="mt-6 pt-6 border-t border-white/5">
                    <h3 class="text-xs font-bold text-slate-500 uppercase tracking-widest mb-3">Detected Categories</h3>
                    <div id="category-tags" class="flex flex-wrap gap-2">
                        <span class="text-xs text-slate-500 italic">N/A</span>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const sourcesList = document.getElementById('sources-list');
        const categoryTags = document.getElementById('category-tags');

        async function handleSend() {
            const query = userInput.value.trim();
            if (!query) return;

            // Clear input
            userInput.value = '';

            // Add user message
            addMessage(query, 'user');

            // Add typing indicator
            const typingId = addTypingIndicator();

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query })
                });

                const data = await response.json();
                
                // Remove typing indicator
                removeTypingIndicator(typingId);

                // Add AI response
                addMessage(data.answer, 'ai');

                // Update context panel
                updateContext(data);

            } catch (error) {
                removeTypingIndicator(typingId);
                addMessage("Sorry, I encountered an error. Please try again later.", 'ai');
            }
        }

        function addMessage(text, role) {
            const div = document.createElement('div');
            div.className = `flex gap-4 fade-in ${role === 'user' ? 'flex-row-reverse' : ''}`;
            
            const icon = role === 'ai' ? 'AI' : 'U';
            const iconBg = role === 'ai' ? 'bg-indigo-600' : 'bg-slate-700';
            const msgBg = role === 'ai' ? 'bg-slate-800/50' : 'bg-indigo-600/20';
            const border = role === 'ai' ? 'border-white/5' : 'border-indigo-500/20';
            const rounded = role === 'ai' ? 'rounded-tl-none' : 'rounded-tr-none';

            div.innerHTML = `
                <div class="w-8 h-8 rounded-full ${iconBg} flex-shrink-0 flex items-center justify-center text-xs font-bold">${icon}</div>
                <div class="${msgBg} rounded-2xl ${rounded} p-4 max-w-[85%] border ${border}">
                    <p class="text-sm leading-relaxed whitespace-pre-wrap">${text}</p>
                </div>
            `;
            
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function addTypingIndicator() {
            const id = 'typing-' + Date.now();
            const div = document.createElement('div');
            div.id = id;
            div.className = 'flex gap-4 fade-in';
            div.innerHTML = `
                <div class="w-8 h-8 rounded-full bg-indigo-600 flex-shrink-0 flex items-center justify-center text-xs font-bold">AI</div>
                <div class="bg-slate-800/50 rounded-2xl rounded-tl-none p-4 border border-white/5">
                    <p class="text-sm typing">Thinking</p>
                </div>
            `;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
            return id;
        }

        function removeTypingIndicator(id) {
            const el = document.getElementById(id);
            if (el) el.remove();
        }

        function updateContext(data) {
            // Update categories
            categoryTags.innerHTML = data.categories.length > 0 
                ? data.categories.map(c => `<span class="px-2 py-1 bg-indigo-500/10 text-indigo-400 text-[10px] font-bold rounded border border-indigo-500/20">${c}</span>`).join('')
                : '<span class="text-xs text-slate-500 italic">General Search</span>';

            // Update sources
            sourcesList.innerHTML = data.context.map((s, i) => `
                <div class="p-3 bg-white/5 rounded-xl border border-white/5 hover:bg-white/10 transition-colors">
                    <div class="flex items-center justify-between mb-2">
                        <span class="text-[10px] font-bold text-indigo-400 uppercase tracking-tighter">Source ${i+1}</span>
                        <span class="text-[10px] text-slate-500">Score: ${s.rerank_score?.toFixed(3) || 'N/A'}</span>
                    </div>
                    <p class="text-[11px] text-slate-300 line-clamp-3 leading-relaxed mb-2">${s.text}</p>
                    <div class="flex items-center gap-1 text-[9px] text-slate-500">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z" />
                        </svg>
                        ${s.source || 'Unknown'}
                    </div>
                </div>
            `).join('');
        }

        sendBtn.addEventListener('click', handleSend);
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleSend();
        });
    </script>
</body>
</html>
